{{ define "packet/online_edit.html" }}
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>SSR方式云包管理</title>
    <style>
        table {
            table-layout: fixed;
            border-collapse: collapse;
            width: 100%;
            overflow-y: auto; /* Enable vertical scrolling */
            max-height: 400px; /* Set a maximum height if needed */
        }

        th, td {
            border: 1px solid #dddddd;
            text-align: left;
            padding: 8px;
            word-wrap: break-word; /* Allow long words to break and wrap onto the next line */
            /* Remove overflow and white-space properties to allow dynamic height */
        }

        th {
            background-color: #f2f2f2;
        }

        /* Set widths for each column */
        th:nth-child(1), td:nth-child(1) { width: 5%; }
        th:nth-child(2), td:nth-child(2) { width: 5%; }
        th:nth-child(3), td:nth-child(3) { width: 15%; }
        th:nth-child(4), td:nth-child(4) { width: 10%; }
        th:nth-child(5), td:nth-child(5) { width: 20%; }
        th:nth-child(6), td:nth-child(6) { width: 15%; }
        th:nth-child(7), td:nth-child(7) { width: 20%; }
    </style>


</head>
<body>

<h4 align="center">云包列表</h4>

<button onclick="delRange()">删除这些云包</button>

<input type="number" id="from" placeholder="想删除的封包编号开始">
<input type="number" id="to" placeholder="想删除的封包编号结束">

<table>
    <tr>
        <th>ID</th>
        <th>Region</th>
        <th>Name</th>
        <th>内容</th>
        <th>Channel</th>
        <th>Uploader</th>
        <th>Time</th>
    </tr>
    {{ range .packets }}
    <tr>
        <td>{{ .Id }}</td>
        <td>{{ .Region }}</td>
        <td>{{ .Name }}</td>
        <td>内容暂时无法编辑</td>
        <td>{{ .Channel }}</td>
        <td>{{ .Uploader }}</td>
        <td>{{ .Time }}</td>
    </tr>
    {{ end }}
</table>

<script>
    function delRange() {
        const from = parseInt(document.getElementById("from").value);
        const to = parseInt(document.getElementById("to").value);

        if (isNaN(from) || isNaN(to)) {
            alert("请输入有效的数字。");
            return;
        }

        deletePackets(from, to);
        alert("删除成功");
        location.reload();
    }

    function deletePackets(from, to) {
        fetch(`/v1/packet/delete/1`, {
            method: 'DELETE',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                from: from,
                to: to,
            }),
        })
            .then(response => response.json())
            .then(data => {
                console.log(data);
            })
            .catch(error => {
                console.error('Error:', error);
            });
    }
</script>

</body>
</html>

{{ end }}
