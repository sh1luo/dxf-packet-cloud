{{ define "packet/online_edit.html" }}
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>SSR Mode Cloud Package Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="shortcut" href="favicon.ico">

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 50px;
        }

        h4 {
            text-align: center;
            color: #007bff;
            margin-bottom: 20px;
        }

        .btn-danger {
            background-color: #dc3545;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .btn-danger:hover {
            background-color: #c82333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            color: #333;
        }

        table {
            table-layout: fixed;
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
            font-weight: bold;
            color: #333;
        }

        .delete-btn {
            background-color: #dc3545;
            color: #fff;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .delete-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>

<div class="container">
    <h4><i class="fas fa-cloud"></i> Cloud Package List</h4>

    <div class="form-group">
        <label for="from">Start Packet ID</label>
        <input type="number" id="from" class="form-control" placeholder="Start Packet ID">
    </div>
    <div class="form-group">
        <label for="to">End Packet ID</label>
        <input type="number" id="to" class="form-control" placeholder="End Packet ID">
    </div>
    <button class="btn btn-danger" onclick="delRange()">批量删除</button>

    <table class="table">
        <thead>
        <tr>
            <th style="width: 10%;">ID</th>
            <th style="width: 10%;">Region</th>
            <th style="width: 15%;">Name</th>
            <th style="width: 15%;">Content</th>
            <th style="width: 15%;">Channel</th>
            <th style="width: 15%;">Uploader</th>
            <th style="width: 15%;">Time</th>
            <th style="width: 10%;">Action</th>
        </tr>
        </thead>
        <tbody>
        {{ range .packets }}
        <tr>
            <td>{{ .Id }}</td>
            <td>{{ .Region }}</td>
            <td>{{ .Name }}</td>
            <td>暂时不可查看</td>
            <td>{{ .Channel }}</td>
            <td>{{ .Uploader }}</td>
            <td>{{ .Time }}</td>
            <td><button class="delete-btn" onclick="deletePacket({{ .Id }})">删除</button></td>
        </tr>
        {{ end }}
        </tbody>
    </table>
</div>


<script>
    function delRange() {
        const from = parseInt(document.getElementById("from").value);
        const to = parseInt(document.getElementById("to").value);

        if (isNaN(from) || isNaN(to)) {
            alert("Please enter valid numbers.");
            return;
        }

        deletePackets(from, to);
    }

    function deletePacket(id) {
        deletePackets(id, id)
    }

    function deletePackets(from, to) {
        if (confirm("Are you sure you want to delete selected packets?")) {
            fetch(`/v1/packet/delete`, {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    from: from,
                    to: to,
                }),
            })
                .then(response => response.json())
                .then(data => {
                    alert(JSON.stringify(data));
                    location.reload();
                })
                .catch(error => {
                    console.error('Error:', error);
                });
        }
    }
</script>

</body>
</html>

{{ end }}
