{{ define "packet/online_edit.html" }}
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>SSR方式云包管理</title>
    <link rel="stylesheet" href="../bootstrap-4.6.2-dist/css/bootstrap.min.css">

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f8f9fa;
        }

        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 50px;
        }

        h4 {
            text-align: center;
            color: #007bff;
        }

        .btn-danger {
            background-color: #dc3545;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ced4da;
            border-radius: 4px;
        }

        table {
            table-layout: fixed;
            border-collapse: collapse;
            width: 100%;
            overflow-y: auto; /* Enable vertical scrolling */
            max-height: 400px; /* Set a maximum height if needed */
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #dddddd;
            text-align: left;
            padding: 8px;
            word-wrap: break-word; /* Allow long words to break and wrap onto the next line */
            /* Remove overflow and white-space properties to allow dynamic height */
        }

        th {
            background-color: #f2f2f2;
        }

        th:nth-child(1), td:nth-child(1) { width: 5%; }
        th:nth-child(2), td:nth-child(2) { width: 5%; }
        th:nth-child(3), td:nth-child(3) { width: 20%; }
        th:nth-child(4), td:nth-child(4) { width: 20%; }
        th:nth-child(5), td:nth-child(5) { width: 20%; }
        th:nth-child(6), td:nth-child(6) { width: 15%; }
        th:nth-child(7), td:nth-child(7) { width: 15%; }
    </style>
</head>
<body>

<div class="container">
    <h4>云包列表</h4>

    <!-- Bootstrap grid system for button and input fields -->
    <div class="row mb-3">
        <div class="col-md-4">
            <button class="btn btn-danger" onclick="delRange()">删除这些云包</button>
        </div>
        <div class="col-md-4">
            <label for="from">想删除的封包编号开始</label>
            <input type="number" id="from" class="form-control" placeholder="想删除的封包编号开始">
        </div>
        <div class="col-md-4">
            <label for="to">想删除的封包编号结束</label>
            <input type="number" id="to" class="form-control" placeholder="想删除的封包编号结束">
        </div>
    </div>

    <table class="table">
        <thead>
        <tr>
            <th>ID</th>
            <th>跨区</th>
            <th>包名</th>
            <th>内容</th>
            <th>频道</th>
            <th>Uploader</th>
            <th>Time</th>
        </tr>
        </thead>
        <tbody>
        {{ range .packets }}
        <tr>
            <td>{{ .Id }}</td>
            <td>{{ .Region }}</td>
            <td>{{ .Name }}</td>
            <td>内容暂时无法编辑</td>
            <td>{{ .Channel }}</td>
            <td>{{ .Uploader }}</td>
            <td>{{ .Time }}</td>
        </tr>
        {{ end }}
        </tbody>
    </table>
</div>


<script>
    function delRange() {
        const from = parseInt(document.getElementById("from").value);
        const to = parseInt(document.getElementById("to").value);

        if (isNaN(from) || isNaN(to)) {
            alert("请输入有效的数字。");
            return;
        }

        deletePackets(from, to);
        alert("删除成功");
        location.reload();
    }

    function deletePackets(from, to) {
        fetch(`/v1/packet/delete/1`, {
            method: 'DELETE',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                from: from,
                to: to,
            }),
        })
            .then(response => response.json())
            .then(data => {
                console.log(data);
            })
            .catch(error => {
                console.error('Error:', error);
            });
    }
</script>

</body>
</html>

{{ end }}
