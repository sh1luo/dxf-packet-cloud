{{ define "packet/online_edit.html" }}
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>SSR方式云包管理</title>
</head>
<body>

<h4 align="center">云包列表</h4>

<button onclick="delRange()">删除这些云包</button>


<input type="number" id="from" placeholder="想删除的封包编号开始">
<input type="number" id="to" placeholder="想删除的封包编号结束">

<br>

{{ range $i, $v := .packets }}
<span id="idd">{{ $v.Id }}</span>
<span>{{ $v.Region }}</span>
<span>{{ $v.Name }}</span>
<span>内容暂时无法编辑</span>
<span>{{ $v.Channel }}</span>
<span>{{ $v.Uploader }}</span>
<span>{{ $v.Time }}</span>
<br>

{{ end }}
</body>
</html>

<script>
    function delRange() {
        // 获取编辑框中的内容
        const from = parseInt(document.getElementById("from").value);
        const to = parseInt(document.getElementById("to").value);

        deletePackets(from, to)
        alert("删除成功")
        location.reload()
    }

    function deletePackets(from, to) {
        // 创建 DELETE 请求
        fetch(`/v1/packet/delete/1`, {
            method: 'DELETE',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                from: from,
                to: to
            }),
        })
            .then(response => response.json())
            .then(data => {
                console.log(data);
            })
            .catch(error => {
                console.error('Error:', error);
            });
    }
</script>

{{ end }}
