{{ define "packet/online_edit.html" }}
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>SSR Mode Cloud Package Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="shortcut" href="favicon.ico">

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
            height: 100vh; /* 页面铺满屏幕 */
        }

        .container {
            margin: auto;
        }

        h4 {
            text-align: center;
            color: #007bff;
            margin-bottom: 30px;
        }

        .btn-danger {
            background-color: #dc3545;
            color: #fff;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn-danger:hover {
            background-color: #c82333;
        }

        .form-group {
            margin-bottom: 30px;
        }

        label {
            font-weight: bold;
            color: #333;
        }

        table {
            table-layout: fixed;
            border-collapse: collapse;
            width: 100%;
            margin-top: 30px;
            background-color: #fff; /* 添加表格背景色 */
            border: 1px solid #dee2e6; /* 添加表格边框 */
        }

        th, td {
            border: 1px solid #dee2e6;
            padding: 15px;
            text-align: left;
            font-size: 16px; /* 调整字体大小 */
        }

        th {
            background-color: #e9ecef;
            font-weight: bold;
            color: #333;
        }

        .custom-btn {
            height: inherit;
            padding: 0.5rem 0.5rem;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h4><i class="fas fa-cloud"></i> Cloud Package List</h4>

    <div class="form-group">
        <label for="from">Start Packet ID</label>
        <input type="number" id="from" class="form-control" placeholder="Start Packet ID">
    </div>
    <div class="form-group">
        <label for="to">End Packet ID</label>
        <input type="number" id="to" class="form-control" placeholder="End Packet ID">
    </div>
    <button type="submit" class="custom-btn btn-danger" onclick="delRange()">批量删除</button> <!-- 使用 Bootstrap 按钮 -->

    <table class="table table-striped table-bordered"> <!-- 添加 Bootstrap 表格样式 -->
        <thead>
        <tr>
            <th style="width: 10%;">ID</th>
            <th style="width: 10%;">Region</th>
            <th style="width: 15%;">Name</th>
            <th style="width: 15%;">Content</th>
            <th style="width: 15%;">Channel</th>
            <th style="width: 15%;">Uploader</th>
            <th style="width: 15%;">Time</th>
            <th style="width: 10%;">Action</th>
        </tr>
        </thead>
        <tbody>
        {{ range.packets }}
        <tr>
            <td>{{.Id }}</td>
            <td>{{.Region }}</td>
            <td>{{.Name }}</td>
            <td>暂时不可查看</td>
            <td>{{.Channel }}</td>
            <td>{{.Uploader }}</td>
            <td>{{.Time }}</td>
            <td><button type="submit" class="custom-btn btn-danger" onclick="deletePacket({{.Id }})">删除</button></td> <!-- 使用 Bootstrap 按钮 -->
        </tr>
        {{ end }}
        </tbody>
    </table>
</div>


<script>
    function delRange() {
        const from = parseInt(document.getElementById("from").value);
        const to = parseInt(document.getElementById("to").value);

        if (isNaN(from) || isNaN(to)) {
            alert("Please enter valid numbers.");
            return;
        }

        deletePackets(from, to);
    }

    function deletePacket(id) {
        deletePackets(id, id)
    }

    function deletePackets(from, to) {
        if (confirm("Are you sure you want to delete selected packets?")) {
            fetch(`/v1/packet/delete`, {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    from: from,
                    to: to,
                }),
            })
                .then(response => response.json())
                .then(data => {
                    alert(JSON.stringify(data));
                    location.reload();
                })
                .catch(error => {
                    console.error('Error:', error);
                });
        }
    }
</script>

</body>
</html>

{{ end }}
